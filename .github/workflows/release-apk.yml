name: Publish APK to Release

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: 'Direct URL to the APK (EAS artifact URL)'
        required: true
      release_tag:
        description: 'Tag for the release (e.g. v1.0.1)'
        required: true
      release_name:
        description: 'Release name (optional)'
        required: false
        default: ''

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download APK from provided URL
        id: download_apk
        run: |
          set -e
          echo "Downloading APK from '${{ github.event.inputs.apk_url }}'"
          curl -L --fail --retry 3 --output app.apk "${{ github.event.inputs.apk_url }}"
          ls -lh app.apk

      - name: Create GitHub release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          release_name: ${{ github.event.inputs.release_name || github.event.inputs.release_tag }}
          body: "Automated release published by workflow"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK to release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./app.apk
          asset_name: app.apk
          asset_content_type: application/vnd.android.package-archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release asset link
        run: |
          echo "Release asset URL: https://github.com/${{ github.repository }}/releases/download/${{ github.event.inputs.release_tag }}/app.apk"
